<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Email Blast Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#142043; --navy-tint:#EAECF3; --navy-bd:#C7CCDD;
    --blue:#0089CF; --info:#1B8FB3; --info-bg:#EDFFFF; --info-bd:#ABF2FF;
    --green:#1E8A3B; --green-bg:#F0FAF2; --green-bd:#CEF0CE; --green-fill:#4EC558;
    --red:#FF4040; --red-bg:#FCEBEE; --red-bd:#F8CFD3;
    --amber:#C99A00; --amber-bg:#FFF7E0; --amber-bd:#F0D98B;
    --ink:#252525; --grey:#717171; --grey2:#909090; --grey3:#B1B1B1;
    --line:#E6E5E6; --line2:#E0E0E0; --bg:#F4F6FB; --card:#fff;
    --r:8px; --sh:0 1px 3px rgba(20,32,67,.07),0 1px 2px rgba(20,32,67,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hide{display:none!important}
  svg{display:block}

  /* ---------- Auth ---------- */
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#1d2f63 0%,var(--navy) 60%)}
  .auth-card{width:380px;max-width:92vw;background:#fff;border-radius:16px;padding:34px 30px;
    box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:22px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--navy);
    display:flex;align-items:center;justify-content:center}
  .brand b{font-size:16px;color:var(--navy);letter-spacing:-.2px}
  .auth-card h1{font-size:19px;text-align:center;color:var(--navy);margin-bottom:4px}
  .auth-card p.sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:22px}
  label.fl{display:block;font-size:12px;font-weight:600;color:var(--navy);margin:0 0 6px}
  .fld{width:100%;height:42px;border:1px solid var(--grey3);border-radius:6px;padding:0 12px;
    font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
  .fld:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,137,207,.13)}
  textarea.fld{height:auto;padding:10px 12px;resize:vertical;line-height:1.5}
  .field{margin-bottom:14px}
  .btn{height:42px;border-radius:6px;font-weight:600;font-size:14px;display:inline-flex;
    align-items:center;justify-content:center;gap:8px;padding:0 16px;transition:filter .15s,opacity .15s}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn-primary{background:var(--navy);color:#fff;width:100%}
  .btn-primary:hover:not(:disabled){filter:brightness(1.12)}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover:not(:disabled){filter:brightness(1.08)}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--grey3)}
  .btn-ghost:hover{background:#f6f7fb}
  .btn-sm{height:34px;font-size:13px;padding:0 12px;border-radius:6px}
  .swap{text-align:center;font-size:13px;color:var(--grey);margin-top:16px}
  .swap b{color:var(--blue);cursor:pointer}
  .err{background:var(--red-bg);border:1px solid var(--red-bd);color:#b3261e;
    font-size:13px;padding:9px 12px;border-radius:6px;margin-bottom:14px}

  /* ---------- Shell ---------- */
  #shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--navy);color:#fff;padding:20px 14px;display:flex;flex-direction:column}
  .side .brand{justify-content:flex-start;margin:4px 6px 26px}
  .side .brand .mark{background:#fff}
  .side .brand b{color:#fff}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    color:#cdd4e6;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;margin-bottom:3px}
  .nav button:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav button.on{background:#fff;color:var(--navy);font-weight:600}
  .nav button.on svg{stroke:var(--navy)}
  .nav svg{stroke:#aeb7d4;width:18px;height:18px;flex:0 0 18px}
  .side .foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.12);padding-top:14px}
  .side .foot .who{font-size:12px;color:#aeb7d4;padding:0 8px 8px;word-break:break-all}
  .side .foot button{color:#cdd4e6;font-size:13px;display:flex;gap:9px;align-items:center;padding:8px;width:100%;border-radius:7px}
  .side .foot button:hover{background:rgba(255,255,255,.07);color:#fff}

  .main{display:flex;flex-direction:column;min-width:0}
  .top{height:62px;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:5}
  .top h2{font-size:17px;color:var(--navy);font-weight:600}
  .top .now{font-size:12px;color:var(--grey2)}
  .content{padding:26px;flex:1;overflow:auto}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}

  /* ---------- Cards / stats ---------- */
  .stat{flex:1;min-width:190px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:16px 18px;box-shadow:var(--sh)}
  .stat .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .stat .v{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.5px}
  .stat .l{font-size:12.5px;color:var(--grey);margin-top:2px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
  .panel .ph{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .panel .ph h3{font-size:15px;color:var(--navy)}
  .pad{padding:18px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--grey2);
    font-weight:600;padding:11px 18px;border-bottom:1px solid var(--line);background:#fafbfd}
  td{padding:13px 18px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .cname{font-weight:600;color:var(--navy)}
  .csub{font-size:12px;color:var(--grey);margin-top:2px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    padding:4px 10px;border-radius:999px;border:1px solid}
  .bar{height:7px;border-radius:99px;background:#eef0f5;overflow:hidden;min-width:110px}
  .bar>i{display:block;height:100%;border-radius:99px}
  .muted{color:var(--grey)}
  .empty{text-align:center;color:var(--grey);padding:42px 18px}
  .empty b{display:block;color:var(--navy);font-size:15px;margin-bottom:5px}

  /* ---------- Grid of cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--sh);
    display:flex;flex-direction:column;gap:8px;transition:border-color .15s,transform .1s}
  .tcard:hover{border-color:var(--navy-bd)}
  .tcard h4{font-size:14.5px;color:var(--navy)}
  .tcard .meta{font-size:12px;color:var(--grey);line-height:1.6}
  .tcard .acts{display:flex;gap:8px;margin-top:6px}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(15,23,46,.5);display:flex;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  .modal{background:#fff;border-radius:14px;width:560px;max-width:96vw;max-height:90vh;overflow:auto;
    box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal .mh h3{font-size:16px;color:var(--navy)}
  .modal .mb{padding:22px}
  .modal .mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .x{width:30px;height:30px;border-radius:7px;color:var(--grey)}
  .x:hover{background:#f1f2f6}

  /* ---------- Wizard ---------- */
  .steps{display:flex;align-items:center;margin:2px 0 22px}
  .step{display:flex;align-items:center;flex:1}
  .step .c{width:30px;height:30px;border-radius:50%;border:2px solid var(--grey3);background:#fff;
    color:var(--grey3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 30px}
  .step.cur .c{border-color:var(--navy);color:var(--navy)}
  .step.done .c{border-color:var(--navy);background:var(--navy);color:#fff}
  .step .sl{font-size:13px;font-weight:600;color:var(--grey2);margin-left:9px;white-space:nowrap}
  .step.cur .sl,.step.done .sl{color:var(--navy)}
  .step .ln{flex:1;height:2px;background:var(--line2);margin:0 12px}
  .step.done .ln{background:var(--navy)}
  .wizbody{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:24px;box-shadow:var(--sh)}
  .wizbody h3{font-size:16px;color:var(--navy);margin-bottom:4px}
  .wizbody p.hint{font-size:13px;color:var(--grey);margin-bottom:18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--navy-tint);color:var(--navy);
    border:1px solid var(--navy-bd);font-size:12px;font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer}
  .check{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .check:last-child{border-bottom:none}
  .check .ci{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 30px}
  .check .cd b{font-size:13.5px;color:var(--navy)}
  .check .cd div{font-size:12px;color:var(--grey)}
  .check .tag{margin-left:auto;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
  .drop{border:2px dashed var(--navy-bd);border-radius:10px;padding:26px;text-align:center;background:#fafbff;cursor:pointer}
  .drop:hover{background:#f3f6ff}
  .drop b{color:var(--navy)}
  .drop small{color:var(--grey)}
  .wbar{display:flex;justify-content:space-between;margin-top:20px}

  /* ---------- toast ---------- */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:11px 18px;border-radius:9px;font-size:13.5px;font-weight:500;
    box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.25s;z-index:100;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.bad{background:#7a1f1f}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  @media(max-width:820px){
    #shell{grid-template-columns:1fr}
    .side{display:none}
    .grid2{grid-template-columns:1fr}
    .step .sl{display:none}
  }
</style>
</head>
<body>

<!-- ===================== AUTH ===================== -->
<div id="auth">
  <div class="auth-card">
    <div class="brand">
      <span class="mark">
        <svg width="20" height="14" viewBox="0 0 20 14"><path d="M1 2.5 10 8 19 2.5" fill="none" stroke="#142043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="1.5" width="18" height="11" rx="2" fill="none" stroke="#142043" stroke-width="2"/></svg>
      </span>
      <b>Email Blast Console</b>
    </div>
    <h1 id="authTitle">Sign in</h1>
    <p class="sub" id="authSub">Manage campaigns, templates and sending accounts</p>
    <div id="authErr" class="err hide"></div>
    <div class="field">
      <label class="fl">Email</label>
      <input id="email" class="fld" type="email" autocomplete="email" placeholder="you@company.com">
    </div>
    <div class="field">
      <label class="fl">Password</label>
      <input id="password" class="fld" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button id="authBtn" class="btn btn-primary">Sign in</button>
    <div class="swap" id="authSwap">No account yet? <b>Create one</b></div>
  </div>
</div>

<!-- ===================== SHELL ===================== -->
<div id="shell" class="hide">
  <aside class="side">
    <div class="brand">
      <span class="mark">
        <svg width="20" height="14" viewBox="0 0 20 14"><path d="M1 2.5 10 8 19 2.5" fill="none" stroke="#142043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="1" y="1.5" width="18" height="11" rx="2" fill="none" stroke="#142043" stroke-width="2"/></svg>
      </span>
      <b>Blast Console</b>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      <div class="who" id="who"></div>
      <button id="signout">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>
  <div class="main">
    <header class="top">
      <h2 id="pageTitle">Dashboard</h2>
      <span class="now" id="now"></span>
    </header>
    <div class="content" id="view"></div>
  </div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
